<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photography</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header> ...same nav... </header>

<div class="container">
<h1>Photography</h1>
<p>Professional photography that strengthens your brand.</p>

<div class="grid">
<img src="images/portrait1.jpg" onclick="openLightbox(0)">
<img src="images/portrait2.jpg" onclick="openLightbox(1)">
<img src="images/event1.jpg" onclick="openLightbox(2)">
<img src="images/event2.jpg" onclick="openLightbox(3)">
<img src="images/product.jpg" onclick="openLightbox(4)">
</div>
</div>

<div class="footer">© Leon Steenkamp Media</div>

<div id="lightbox">
<span class="close" onclick="closeLightbox()">&times;</span>
<img id="lightbox-img">
<span class="prev" onclick="changeImage(-1)">&#10094;</span>
<span class="next" onclick="changeImage(1)">&#10095;</span>
</div>

<a href="https://wa.me/270828573307" class="whatsapp-float" target="_blank">...</a>

<script>
const images = [
"images/portrait1.jpg",
"images/portrait2.jpg",
"images/event1.jpg",
"images/event2.jpg",
"images/product.jpg"
];
let currentIndex = 0;
function openLightbox(i){currentIndex=i;document.getElementById("lightbox").style.display="flex";document.getElementById("lightbox-img").src=images[i];}
function closeLightbox(){document.getElementById("lightbox").style.display="none";}
function changeImage(d){currentIndex=(currentIndex+d+images.length)%images.length;document.getElementById("lightbox-img").src=images[currentIndex];}
</script>

</body>
</html>
