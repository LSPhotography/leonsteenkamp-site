<script>
function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

<img src="images/product.jpg">
</div>
<div class="gallery">
  <img src="images/portrait1.jpg" onclick="openLightbox(this)">
  <img src="images/portrait2.jpg" onclick="openLightbox(this)">
  <img src="images/event1.jpg" onclick="openLightbox(this)">

  <img src="images/product.jpg" onclick="openLightbox(this)">
</div>

<div id="lightbox" onclick="closeLightbox()">
